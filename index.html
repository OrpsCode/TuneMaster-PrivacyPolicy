<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuneMaster Docs</title>
  <style>
    :root {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f5f5f5;
      background-color: #0f0f0f;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      width: min(760px, 100%);
      padding: 48px 40px;
      border-radius: 22px;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: none;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
      letter-spacing: -0.5px;
    }
    p {
      color: #d4d5dd;
      margin: 0 0 28px;
      line-height: 1.6;
    }
    .policy-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      background: #0071ff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      box-shadow: 0 15px 30px rgba(0, 113, 255, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .policy-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(0, 113, 255, 0.45);
    }
    footer {
      margin-top: 34px;
      color: #888fa8;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>TuneMaster Privacy</h1>
    <p>
      Tap below to read the privacy policy for TuneMaster. That’s it—no extra guides, just the policy.
    </p>
    <a class="policy-button" href="./privacy-policy.html">View Privacy Policy</a>
    <footer>Hosted via GitHub Pages; updates to these files publish immediately.</footer>
  </div>
</body>
</html>
